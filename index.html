<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
    </style>
  </head>
  <body>
    <header>
      <figure id="top">
        <img src="assets/images/Left.png" alt="logo" />
        <img src="assets/images/Center.png" alt="search bar" />
        <img src="assets/images/Right.png" alt="profile" />
      </figure>
    </header>
    <main>
      <div id="content">
        <iframe
          width="750"
          height="400"
          src="https://www.youtube.com/embed/QVFErIvhBy8?si=laRRgzlwQfyuiiHB"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
        <h2 id="title">
          A verdade sobre A Psicologia do LOUCO (pra ouvir enquanto faz outras
          coisas)
        </h2>
        <figure>
          <img src="./assets/images/Video Actions.png" alt="video actions" />
        </figure>
        <p>300k views 1 month ago</p>
        <p>
          Você passou a vida tentando não parecer bobo. Foi exatamente isso que
          te transformou num.
        </p>
      </div>
      <nav>
        <section class="recomendations">
          <iframe
            width="180"
            height="104"
            src="https://www.youtube.com/embed/TRPBY_lxJfE?si=9GD1-D2e783NHHjk"
            title="YouTube video player"
            frameborder="0"
            allow="
              accelerometer;
              autoplay;
              clipboard-write;
              encrypted-media;
              gyroscope;
              picture-in-picture;
              web-share;
            "
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </section>
      </nav>
    </main>
    <footer></footer>
  </body>
</html>
